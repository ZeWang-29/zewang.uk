- title: "The Dynamics of Discrimination: Theory and Evidence"
  authors: "Bohren, Imas & Rosenberg"
  year: 2019
  venue: "American Economic Review"
  topic: "Economics"
  date_read: "2026-06-01"
  summary: |
    This research explores how discrimination evolves when workers accumulate track records. The fundamental insight centers on a critical distinction: "signals (quality) are unobservable, but evaluations (history) are observable." The authors develop theory showing that different discrimination sources—correct beliefs, biased beliefs, or preferences—produce distinct dynamic patterns. Whether discrimination reverses between novice and established stages directly tests the underlying mechanism.
